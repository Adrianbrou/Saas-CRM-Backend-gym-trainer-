name: CI

on: push

jobs: 
    test: 
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v3 
          - uses: actions/setup-python@v4
            with:
                python-version: "3.11"
          - name: Install dependencies
            run: pip install -r requirements.txt
          - name: Check syntax
            run: python -m py_compile main.py
          - name: Set PYTHONPATH via symlink
            run: |
              mkdir -p /tmp/pyroot
              ln -s $GITHUB_WORKSPACE /tmp/pyroot/app
              echo "PYTHONPATH=/tmp/pyroot" >> $GITHUB_ENV
          - name: Run tests
            run: pytest tests/ -v

