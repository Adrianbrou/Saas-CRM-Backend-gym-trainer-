name: CI

on: push

jobs: 
    test: 
        runs-on: ubuntu-latest
        services:
          redis:
            image: redis:7
            ports:
              - 6379:6379

        steps:
          - uses: actions/checkout@v3 
          - uses: actions/setup-python@v4
            with:
                python-version: "3.11"
          - name: Install dependencies
            run: pip install -r requirements.txt
          - name: Check syntax
            run: python -m py_compile app/main.py
          - name: Set env variables
            env:
              SECRET_KEY: ${{ secrets.SECRET_KEY }}
              ALGORITHM: ${{ secrets.ALGORITHM }}
              DATABASE_URL: ${{ secrets.DATABASE_URL }}
              MAIL_HOST: ${{ secrets.MAIL_HOST }}
              MAIL_PORT: ${{ secrets.MAIL_PORT }}
              MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
              MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
              ACCESS_TOKEN_EXPIRE_MINUTES: ${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
            run: |
              echo "SECRET_KEY=$SECRET_KEY" >> $GITHUB_ENV
              echo "ALGORITHM=$ALGORITHM" >> $GITHUB_ENV
              echo "DATABASE_URL=$DATABASE_URL" >> $GITHUB_ENV
              echo "MAIL_HOST=$MAIL_HOST" >> $GITHUB_ENV
              echo "MAIL_PORT=$MAIL_PORT" >> $GITHUB_ENV
              echo "MAIL_USERNAME=$MAIL_USERNAME" >> $GITHUB_ENV
              echo "MAIL_PASSWORD=$MAIL_PASSWORD" >> $GITHUB_ENV
              echo "ACCESS_TOKEN_EXPIRE_MINUTES=$ACCESS_TOKEN_EXPIRE_MINUTES" >> $GITHUB_ENV
          - name: Run tests
            run: pytest tests/ -v
          
    deploy:
        runs-on: ubuntu-latest
        needs: test
        if: github.ref == 'refs/heads/main'

        steps:
          - uses: actions/checkout@v3

          - name: Configure AWS credentials
            uses: aws-actions/configure-aws-credentials@v2
            with:
              aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
              aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
              aws-region: us-east-1

          - name: Login to ECR
            uses: aws-actions/amazon-ecr-login@v1

          - name: Build and push image
            run: |
              docker build -t 078558209271.dkr.ecr.us-east-1.amazonaws.com/crm-backend:latest .
              docker push 078558209271.dkr.ecr.us-east-1.amazonaws.com/crm-backend:latest

          - name: Deploy to ECS
            run: |
              aws ecs update-service --cluster crm-cluster --service crm-backend-service --force-new-deployment
